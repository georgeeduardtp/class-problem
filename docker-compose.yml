version: '3.8'

services:
  db:
    image: postgres:15
    container_name: class-problem
    environment:
      POSTGRES_USER: classproblem
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: classproblem_db
    ports:
      - "5433:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

volumes:
  db_data:
